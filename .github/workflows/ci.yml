name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  filter:
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      node: ${{ steps.filter.outputs.node }}
      frontend: ${{ steps.filter.outputs.frontend }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            go:
              - 'api/golang/**'
            node:
              - 'api/nodejs/**'
            frontend:
              - 'frontend/**'
            workflows:
              - '.github/workflows/**'

  go-api:
    name: Go API
    needs: filter
    if: github.event_name == 'push' || needs.filter.outputs.go == 'true' || needs.filter.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api/golang
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: api/golang/go.sum

      - name: Install dependencies
        run: go mod download

      - name: Run tests
        run: go test -v ./...

      - name: Build
        run: go build -v ./cmd/main.go

      - name: Docker Build (Smoke Test)
        run: docker build -t pv-tracker-go-api:test -f docker/Dockerfile ../../

  node-api:
    name: Node API
    needs: filter
    if: github.event_name == 'push' || needs.filter.outputs.node == 'true' || needs.filter.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api/nodejs
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '26'
          cache: 'npm'
          cache-dependency-path: api/nodejs/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Docker Build (Smoke Test)
        run: docker build -t pv-tracker-node-api:test .

  frontend:
    name: Frontend
    needs: filter
    if: github.event_name == 'push' || needs.filter.outputs.frontend == 'true' || needs.filter.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20' # Modern Node for frontend
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  ci-complete:
    name: CI Complete
    needs: [go-api, node-api, frontend]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check Statuses
        run: |
          if [[ "${{ needs.go-api.result }}" != "success" && "${{ needs.go-api.result }}" != "skipped" ]]; then
            echo "Go API failed"
            exit 1
          fi
          if [[ "${{ needs.node-api.result }}" != "success" && "${{ needs.node-api.result }}" != "skipped" ]]; then
            echo "Node API failed"
            exit 1
          fi
          if [[ "${{ needs.frontend.result }}" != "success" && "${{ needs.frontend.result }}" != "skipped" ]]; then
            echo "Frontend failed"
            exit 1
          fi
          echo "All relevant checks passed or were skipped"
