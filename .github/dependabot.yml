version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/api/golang"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/api/nodejs"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"

  - package-ecosystem: "docker"
    directory: "/api/golang/docker"
    schedule:
      interval: "weekly"

  - package-ecosystem: "docker"
    directory: "/api/nodejs"
    schedule:
      interval: "weekly"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
